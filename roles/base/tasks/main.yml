    - name: Enable sudo for wheel group
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        regexp: '^# %wheel ALL=\(ALL:ALL\) ALL'
        line: "%wheel ALL=(ALL:ALL) ALL"
        state: present
        validate: "visudo -cf %s"
      become: true

    - name: Restricting root login
      ansible.builtin.user:
        name: root
        password: "!"
      become: true

    - name: Set timezone
      community.general.timezone:
        name: Europe/Kyiv
      become: true

    # TODO: make faster by using ansible.posix.synchronize (bad, requires rsync) or by parallelizing
    - name: Copy dotfiles
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "/home/{{ ansible_user }}/"
        mode: preserve
      with_items:
        - .zshrc
        - .zshenv
        - .zprofile
        - .config
        - .local

    - name: Install packages
      ansible.builtin.pacman:
        name:
        # system maintainability
          - pacman-contrib # paccache
        # base system standards
          - xdg-user-dirs # "well known" (.config/user-dirs.dirs) user directories manager
          - zsh
          - upower
          - tlp
          - tlp-pd
        # backup package managers
          - base-devel # for yay tool build
        # base system senses
          - pipewire # for audio handling
          - wireplumber # pipewire helper
          - pipewire-pulse # pipewire helper - pulseaudio replacement
          - brightnessctl # backlight/screen brightness manager
          - openssh # ssh/scp/sftp
          - bluez # bluetooth
          - bluez-utils # bluez cli
          - bluetui # bluetooth tui
          # - openvpn # maybe needed - TODO - test
          - networkmanager-openvpn # NetworkManager restart needed
        # base utils
          - man-db # main man repo
          - man-pages # provides both the Linux and the POSIX.1 man pages
          - pass # password manager
          - emacs-nox
          - mc # file manager # TODO: check ranger
          - bc # calculator
          - curl
          - htop
          - ncdu # disk usage display
          - mpv # TODO: merge with vlc
          - ffmpeg # for video/audio processing
          - tree
          - jq
          - yq
          - croc # super convinient file node-to-node transfer tool
          - zbar # qr/bar codes reader (cli/webcam)
          - qrencode
        # display manager
          - ly # display manager (semi-login manager)
        # base development tools
          - plantuml
          - hurl # curl automation
          - fnm
          - docker
          - docker-compose
          - pastel # color palets
          - speedtest-cli # https://speed.cloudflare.com could be used in browser
          - fastfetch # system info
          - asciinema # terminal session recording
        state: present
      become: true

    - name: Enable systemd services
      ansible.builtin.systemd:
        unit: '{{ item }}.service'
        enabled: yes
      with_items:
        - ly@tty1
      become: true

    # TODO: make faster by parallelizing
    - name: Enable and start systemd services
      ansible.builtin.systemd:
        unit: '{{ item }}.service'
        enabled: yes
        state: started
      with_items:
        - bluetooth
        - tlp
        - tlp-pd
        - docker
      become: true

    - name: Ensure user is respective groups
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes
      become: true

    - name: Create XDG user directories
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/{{ item }}"
        state: directory
      with_items:
        - downloads

    - name: Get battery ID
      ansible.builtin.command: bash -c "upower -b | awk '/native-path/ {print $2}'"
      register: battery_id
      changed_when: false

    - name: Copy ly/config.ini # TODO: came out with the way to copy all system files | TODO: look into "file written before package install" potential problem
      ansible.builtin.template:
        src: ly/config.ini.j2
        dest: /etc/ly/config.ini
        owner: root
        group: root
        mode: "644"
      become: true

    - name: Set default shell to zsh
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        shell: /usr/bin/zsh
      become: true

    - name: Configure git init.defaultBranch
      community.general.git_config:
        name: init.defaultBranch
        value: main
        scope: global
    
    - name: Create the `aur_builder` user
      ansible.builtin.user:
        name: aur_builder
        create_home: yes
        group: wheel # "groups: wheel,docker" maybe needed
      become: yes

    - name: Allow the `aur_builder` user to run `sudo pacman` without a password
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/11-install-aur_builder
        line: "aur_builder ALL=(ALL) NOPASSWD: /usr/bin/pacman"
        create: yes
        mode: 0644
        validate: "visudo -cf %s"
      become: yes

    - name: Install yay from AUR manually
      ansible.builtin.shell: |
        runuser -u aur_builder -- bash -c '
        git clone https://aur.archlinux.org/yay.git /home/aur_builder/yay || echo "already cloned"
        cd /home/aur_builder/yay
        makepkg -si --noconfirm
        '
      args:
        executable: /bin/bash
        creates: /usr/bin/yay
      become: true

    - name: Create swapfile
      ansible.builtin.command:
        cmd: mkswap -U clear --size 16G --file /swapfile
        creates: /swapfile
      become: true

    - name: Enable swapfile
      ansible.builtin.command: swapon /swapfile
      register: swapon_result
      changed_when: swapon_result.rc == 0
      failed_when: false
      become: true

    - name: Add swapfile to /etc/fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "/swapfile none swap defaults 0 0"
        state: present
      become: true

    - name: Configure swappiness
      ansible.posix.sysctl:
        sysctl_file: /etc/sysctl.d/99-swappiness.conf
        name: vm.swappiness
        value: '1'
        state: present
      become: true
