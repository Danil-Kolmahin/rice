    - name: Enable sudo for wheel group
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        regexp: '^# %wheel ALL=\(ALL:ALL\) ALL'
        line: "%wheel ALL=(ALL:ALL) ALL"
        state: present
        validate: "visudo -cf %s"
      become: true

    - name: Restricting root login
      ansible.builtin.user:
        name: root
        password: "!"
      become: true

    - name: Set timezone
      community.general.timezone:
        name: Europe/Kyiv
      become: true

    # TODO: make faster by using ansible.posix.synchronize (bad, requires rsync) or by parallelizing
    - name: Copy dotfiles
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "/home/{{ ansible_user }}/"
        mode: preserve
      with_items:
        - .config
        - .local

    - name: Configure zsh
      ansible.builtin.import_tasks: zsh.yml

    - name: Set XDG standard
      ansible.builtin.import_tasks: xdg.yml

    - name: Configure git
      ansible.builtin.import_tasks: git.yml

    - name: Install and configure ly display manager (semi-login manager)
      ansible.builtin.import_tasks: ly.yml
