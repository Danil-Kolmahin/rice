[general]
import = [ "colors.toml" ]

[window]
title = "Terminal"

[scrolling]
history = 100000
multiplier = 1

[font] # TODO: $FONT
normal = { family = "IBM Plex Mono" }
size = 13

[cursor]
style = { shape = "Underline", blinking = "On" }
unfocused_hollow = false

[terminal]
shell = { program = "/usr/bin/zsh", args = ["-l"] }

[bell]
command = { program = "bash", args = ["-c", "pw-play $HOME/.local/share/sounds/bell.wav"] }
