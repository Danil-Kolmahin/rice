    - name: Check for NVIDIA GPU
      ansible.builtin.shell: lspci | grep -qi nvidia
      register: nvidia_check
      failed_when: false
      changed_when: false

    - name: Install nvidia packages
      ansible.builtin.pacman:
        name:
          - nvidia-open
          - nvidia-utils
        state: present
      when: nvidia_check.rc == 0
      become: true
      # notify: Run mkinitcpio -P # almost certainly not needed

    # TODO: make faster by using ansible.posix.synchronize (bad, requires rsync) or by parallelizing
    - name: Copy dotfiles
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "/home/{{ ansible_user }}/"
        mode: preserve
      with_items:
        - .config
        - .local

    # TODO: merge all templates below to single task
    - name: Template alacritty/colors.toml
      ansible.builtin.template:
        src: .config/alacritty/colors.toml.j2
        dest: "/home/{{ ansible_user }}/.config/alacritty/colors.toml"

    - name: Template sway/colors
      ansible.builtin.template:
        src: .config/sway/colors.j2
        dest: "/home/{{ ansible_user }}/.config/sway/colors"

    - name: Template qutebrowser/colors.py
      ansible.builtin.template:
        src: .config/qutebrowser/colors.py.j2
        dest: "/home/{{ ansible_user }}/.config/qutebrowser/colors.py"

    - name: Install packages
      ansible.builtin.pacman:
        name:
          - ttf-ibm-plex # font, TODO: consider other options - ttf-jetbrains-mono, iosevka-nerd-font
          - noto-fonts-emoji # emojis
          - sway
          - swaylock # lock screen for sway
          - xdg-desktop-portal # file access, opening URIs, printing etc | https://github.com/swaywm/sway/wiki/XDG-Desktop-Portal-configuration
          - xdg-desktop-portal-wlr # wayland xdg-desktop-portal
          - xdg-desktop-portal-gtk # backup for xdg-desktop-portal-wlr TODO: check for replacing on kde
          - xorg-xwayland # non-wayland apps support (i.e. eliminates 'export DISPLAY=:0 steam -enable-wayland-display')
          - wl-clipboard # basic copy paste
          - wl-clip-persist # fixes "on-demand" wayland clipboard save
          - cliphist # wl-clipboard + clipboard history
          - grim # cli screenshots, screenshots gui backend
          - flameshot # screenshots gui
          - wf-recorder # screencast
          - mako # notifycations
          - libnotify # send desktop notifications (notify-send)
          - wmenu # app launcher
          - alacritty
          - libreoffice-fresh # office suite
          - flatpak
          - tesseract
          - tesseract-data-eng
          - tesseract-data-ukr
          - languagetool # spell check
          - lazydocker
          - github-cli
          - lazygit
          - k9s
          # - obs-studio
          - gimp # raster image editor
          - inkscape # vector image editor
          # - blender # 3D modelling
          - cava # audio visualization tool
          - torbrowser-launcher # the only way to run tor from pacman
        state: present
      become: true

    - name: Configure GUI browser
      ansible.builtin.import_tasks: browser.yml

    - name: Install flatpak packages
      community.general.flatpak:
        name:
          - io.dbeaver.DBeaverCommunity
          - me.iepure.devtoolbox

    - name: Check if WAYLAND_DISPLAY is in systemd user env
      ansible.builtin.command: systemctl --user show-environment
      register: systemctl_user_env
      changed_when: false

    - name: Export Wayland vars if missing
      ansible.builtin.command: >
        systemctl --user set-environment
        WAYLAND_DISPLAY={{ lookup('env', 'WAYLAND_DISPLAY') }}
        XDG_CURRENT_DESKTOP={{ lookup('env', 'XDG_CURRENT_DESKTOP') | default('sway:wlroots') }}
      when: "'WAYLAND_DISPLAY' not in systemctl_user_env.stdout"

    - name: Configure Sway for unsupported GPUs
      ansible.builtin.replace:
        path: /usr/share/wayland-sessions/sway.desktop
        regexp: '^Exec=sway$'
        replace: 'Exec=sway --unsupported-gpu'
      when: nvidia_check.rc == 0
      become: true

    - name: Check which AUR packages are already installed
      vars:
        aur_packages:
          - ditto
      ansible.builtin.command:
        cmd: "pacman -Qi {{ item }}"
      loop: "{{ aur_packages }}"
      register: aur_check
      failed_when: false
      changed_when: false

    - name: Install missing AUR packages manually
      vars:
        missing_packages: "{{ aur_check.results | rejectattr('rc', 'eq', 0) | map(attribute='item') | list }}"
      ansible.builtin.shell: |
        runuser -u aur_builder -- yay -S --aur --noconfirm --noprogressbar --needed {{ missing_packages | join(' ') }}
      args:
        executable: /bin/bash
      when: missing_packages | length > 0
      become: true
