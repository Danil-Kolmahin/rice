      #     ansible.builtin.systemd:
      #       unit: '{{ item }}'
      #       enabled: yes
      #       state: started
      #       scope: user
      #     with_items:
      #       - pipewire.service
      #       - wireplumber.service
      #       - pipewire-pulse.service
