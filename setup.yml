---
- hosts: "{{ target_hosts }}"
  tasks:
    - name: Set ansible_user variable # TODO: fix https://github.com/ansible/ansible/issues/23530
      set_fact: ansible_user="{{ lookup('pipe', 'whoami') }}"

    - name: Enable sudo for wheel group
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        regexp: '^# %wheel ALL=\(ALL:ALL\) ALL'
        line: "%wheel ALL=(ALL:ALL) ALL"
        state: present
        validate: "visudo -cf %s"
      become: true

    - name: Restricting root login
      ansible.builtin.user:
        name: root
        password: "!"
      become: true

    - name: Set timezone
      community.general.timezone:
        name: Europe/Kyiv
      become: true

    # TODO: make faster by using ansible.posix.synchronize (bad, requires rsync) or by parallelizing
    - name: Copy dotfiles
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "/home/{{ ansible_user }}/"
        mode: preserve
      with_items:
        - .zshrc
        - .zshenv
        - .zprofile
        - .config
        - .local

    - name: Install packages
      ansible.builtin.pacman:
        name:
          - pacman-contrib # paccache
          - base-devel # for yay tool build
          - zsh
          - openssh # ssh/scp/sftp
          - man-db # main man repo
          - man-pages # provides both the Linux and the POSIX.1 man pages
          - bc # calculator
          - htop
          - curl
          - hurl # curl automation
          - tree
          - jq
          - yq
          - upower
          - tlp
          - tlp-pd
          - ffmpeg # for video/audio processing
          - pass # password manager
          - ncdu # disk usage display
          - bluez # bluetooth
          - bluez-utils # bluez cli
          - bluetui # bluetooth tui
          # - openvpn # maybe needed - TODO - test
          - networkmanager-openvpn # NetworkManager restart needed
          - ttf-ibm-plex # font, TODO: consider other options - ttf-jetbrains-mono, iosevka-nerd-font
          - noto-fonts-emoji # emojis
          - ly # display manager (semi-login manager)
          - sway
          - swaylock # lock screen for sway
          - xdg-desktop-portal # file access, opening URIs, printing etc | https://github.com/swaywm/sway/wiki/XDG-Desktop-Portal-configuration
          - xdg-desktop-portal-wlr # wayland xdg-desktop-portal
          - xdg-desktop-portal-gtk # backup for xdg-desktop-portal-wlr TODO: check for replacing on kde
          - xdg-user-dirs # "well known" (.config/user-dirs.dirs) user directories manager
          - pipewire # for audio handling
          - wireplumber # pipewire helper
          - pipewire-pulse # pipewire helper - pulseaudio replacement
          - brightnessctl # backlight/screen brightness manager
          - wl-clipboard # basic copy paste
          - cliphist # wl-clipboard + clipboard history
          - grim # cli screenshots, screenshots gui backend
          - flameshot # screenshots gui
          - wf-recorder # screencast
          - zbar # qr/bar codes reader (cli/webcam)
          - qrencode
          - mako # notifycations
          - libnotify # send desktop notifications (notify-send)
          - wmenu # app launcher
          - alacritty
          - qutebrowser
          - xcb-util-cursor # for qutebrowser TODO: check if actually needed
          - mesa # for qutebrowser TODO: check if actually needed
          - qt6-base # for qutebrowser TODO: check if actually needed
          - qt6-webengine # for qutebrowser TODO: check if actually needed
          - qt6-wayland # for qutebrowser TODO: check if actually needed
          - emacs-nox
          - libreoffice-fresh # office suite
          - flatpak
          - croc # super convinient file node-to-node transfer tool
          - tesseract
          - tesseract-data-eng
          - tesseract-data-ukr
          - fnm
          - docker
          - docker-compose
          - pastel # color palets
          - plantuml
          - asciinema # terminal session recording
          - fastfetch # system info
          - speedtest-cli # https://speed.cloudflare.com could be used in browser
          - mc # file manager # TODO: check ranger
          - vlc # media player TODO: search for cli tools
          - lazydocker
          - github-cli
          - lazygit
          - k9s
          # - obs-studio
          - gimp # raster image editor
          - inkscape # vector image editor
          - blender # 3D modelling
          - cava # audio visualization tool
          - torbrowser-launcher # the only way to run tor from pacman
          - qemu-full # qemu/kvm VMs
          - libvirt # qemu/kvm VMs (cli)
          - virt-install # qemu/kvm VMs
          - virt-viewer # qemu/kvm VMs
          - dnsmasq # qemu/kvm VMs (network, low chance to be optional)
          - ollama
          - ollama-cuda # TODO: change to AMD hopefully
          - terraform
          - prismlauncher
        state: present
      become: true

    - name: Enable systemd services
      ansible.builtin.systemd:
        unit: '{{ item }}.service'
        enabled: yes
      with_items:
        - ly@tty1
        - libvirtd
      become: true

    # TODO: make faster by parallelizing
    - name: Enable and start systemd services
      ansible.builtin.systemd:
        unit: '{{ item }}.service'
        enabled: yes
        state: started
      with_items:
        - bluetooth
        - tlp
        - tlp-pd
        - docker
        - ollama
      become: true

    - name: Ensure user is respective groups
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker,libvirt
        append: yes
      become: true

    # # TODO: test and refactor
    # - name: Configure Ollama environment variables
    #   ansible.builtin.copy:
    #     dest: /etc/systemd/system/ollama.service.d/override.conf
    #     content: |
    #       [Service]
    #       Environment="OLLAMA_CONTEXT_LENGTH=64000"
    #     mode: '0644'
    #   # notify: restart ollama # TODO: do we need restarts?

    - name: Create XDG user directories
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/{{ item }}"
        state: directory
      with_items:
        - downloads

    - name: Get battery ID
      ansible.builtin.command: bash -c "upower -b | awk '/native-path/ {print $2}'"
      register: battery_id
      changed_when: false

    - name: Copy ly/config.ini # TODO: came out with the way to copy all system files | TODO: look into "file written before package install" potential problem
      ansible.builtin.template:
        src: ly/config.ini.j2
        dest: /etc/ly/config.ini
        owner: root
        group: root
        mode: "644"
      become: true

    # relogin !!!

    - name: Set default shell to zsh
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        shell: /usr/bin/zsh
      become: true

    - name: Configure git init.defaultBranch
      community.general.git_config:
        name: init.defaultBranch
        value: main
        scope: global

    - name: Install flatpak packages
      community.general.flatpak:
        name:
          - io.github.ungoogled_software.ungoogled_chromium
          - io.dbeaver.DBeaverCommunity
          - me.iepure.devtoolbox

    - name: Create the `aur_builder` user
      ansible.builtin.user:
        name: aur_builder
        create_home: yes
        group: wheel # "groups: wheel,docker" maybe needed
      become: yes

    - name: Allow the `aur_builder` user to run `sudo pacman` without a password
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/11-install-aur_builder
        line: "aur_builder ALL=(ALL) NOPASSWD: /usr/bin/pacman"
        create: yes
        mode: 0644
        validate: "visudo -cf %s"
      become: yes

    - name: Install yay from AUR manually
      ansible.builtin.shell: |
        runuser -u aur_builder -- bash -c '
        git clone https://aur.archlinux.org/yay.git /home/aur_builder/yay || echo "already cloned"
        cd /home/aur_builder/yay
        makepkg -si --noconfirm
        '
      args:
        executable: /bin/bash
        creates: /usr/bin/yay
      become: true

    # TODO: stop upgrading!
    - name: Install AUR packages manually
      vars:
        aur_packages:
          - chromium-widevine # for qutebrowser, allows streaming (DRM content)
          - opencode-bin
          - models-bin
          - llmfit
          - pi-coding-agent
          - claude-code
          # - argos-translate
      ansible.builtin.shell: |
        runuser -u aur_builder -- yay -S --noconfirm --noprogressbar --needed {{ aur_packages | join(' ') }}
      args:
        executable: /bin/bash
      register: aur_install_result
      changed_when: "'Downloading' in aur_install_result.stdout"
      become: true

    - name: Check if qutebrowser is already the default browser
      ansible.builtin.shell: xdg-mime query default x-scheme-handler/http
      register: current_default_browser
      changed_when: false

    - name: Set qutebrowser as default web browser
      ansible.builtin.shell: xdg-settings set default-web-browser org.qutebrowser.qutebrowser.desktop
      when: "'org.qutebrowser.qutebrowser.desktop' not in current_default_browser.stdout"
      changed_when: true

    - name: Set qutebrowser as default for http and https
      ansible.builtin.shell: xdg-mime default org.qutebrowser.qutebrowser.desktop x-scheme-handler/http x-scheme-handler/https
      when: "'org.qutebrowser.qutebrowser.desktop' not in current_default_browser.stdout"
      changed_when: true

    - name: Check if WAYLAND_DISPLAY is in systemd user env
      ansible.builtin.command: systemctl --user show-environment
      register: systemctl_user_env
      changed_when: false

    - name: Export Wayland vars if missing
      ansible.builtin.command: >
        systemctl --user set-environment
        WAYLAND_DISPLAY={{ lookup('env', 'WAYLAND_DISPLAY') }}
        XDG_CURRENT_DESKTOP={{ lookup('env', 'XDG_CURRENT_DESKTOP') | default('sway:wlroots') }}
      when: "'WAYLAND_DISPLAY' not in systemctl_user_env.stdout"

    - name: Create swapfile
      ansible.builtin.command:
        cmd: mkswap -U clear --size 16G --file /swapfile
        creates: /swapfile
      become: true

    - name: Enable swapfile
      ansible.builtin.command: swapon /swapfile
      register: swapon_result
      changed_when: swapon_result.rc == 0
      failed_when: false
      become: true

    - name: Add swapfile to /etc/fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "/swapfile none swap defaults 0 0"
        state: present
      become: true

    - name: Configure swappiness
      ansible.posix.sysctl:
        sysctl_file: /etc/sysctl.d/99-swappiness.conf
        name: vm.swappiness
        value: '1'
        state: present
      become: true

    - name: VivoBook audio fix
      when: "'vivobook' in ansible_product_name | lower"
      block:
        - name: Configure SOF DSP driver
          ansible.builtin.copy:
            dest: /etc/modprobe.d/alsa-base.conf
            content: "options snd-intel-dspcfg dsp_driver=3\n"
            owner: root
            group: root
            mode: "644"
          become: true

        - name: Install SOF and Intel firmware and  ALSA and ALSA utils
          ansible.builtin.pacman:
            name:
              - sof-firmware
              # - linux-firmware-intel
              # - pipewire-alsa
              # - alsa-utils
            state: present
          become: true

